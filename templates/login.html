<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthentiAction - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
        color: #fff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 500px;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .logo {
        font-size: 3em;
        margin-bottom: 10px;
      }

      .title {
        font-size: 2.2em;
        color: #00dc82;
        font-weight: bold;
        margin: 10px 0;
      }

      .subtitle {
        color: #888;
        font-size: 0.95em;
      }

      .login-box {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        padding: 40px;
        border-radius: 12px;
        border: 1px solid #00dc82;
        box-shadow: 0 0 30px rgba(0, 220, 130, 0.1);
      }

      .form-group {
        margin-bottom: 30px;
      }

      .form-group label {
        display: block;
        margin-bottom: 10px;
        color: #00dc82;
        font-weight: 500;
        font-size: 0.95em;
      }

      .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #00dc82;
        background: #222;
        color: #fff;
        border-radius: 8px;
        font-size: 1em;
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: #00dc82;
        box-shadow: 0 0 10px rgba(0, 220, 130, 0.3);
      }

      .button-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .btn {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.95em;
      }

      .btn-register {
        background: linear-gradient(135deg, #00dc82 0%, #00a86b 100%);
        color: black;
        border: 1px solid #00dc82;
      }

      .btn-register:hover {
        box-shadow: 0 0 20px rgba(0, 220, 130, 0.5);
        transform: translateY(-2px);
      }

      .btn-authenticate {
        background: linear-gradient(135deg, #00a8ff 0%, #0088cc 100%);
        color: white;
        border: 1px solid #00a8ff;
      }

      .btn-authenticate:hover {
        box-shadow: 0 0 20px rgba(0, 168, 255, 0.5);
        transform: translateY(-2px);
      }

      .info-box {
        margin-top: 30px;
        padding: 20px;
        background: rgba(0, 220, 130, 0.1);
        border-left: 4px solid #00dc82;
        border-radius: 8px;
        text-align: center;
        color: #bbb;
        font-size: 0.9em;
      }

      .error {
        color: #ff6b6b;
        padding: 10px;
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid #ff6b6b;
        border-radius: 5px;
        margin-bottom: 20px;
        text-align: center;
      }

      .success {
        color: #00dc82;
        padding: 10px;
        background: rgba(0, 220, 130, 0.1);
        border: 1px solid #00dc82;
        border-radius: 5px;
        margin-bottom: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">🔐</div>
        <h1 class="title">AuthentiAction</h1>
        <p class="subtitle">Pattern-Based Gesture Authentication</p>
      </div>

      <div class="login-box">
        <div id="message"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="username">👤 Username</label>
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              required
              autofocus
            />
          </div>

          <div class="button-group">
            <button
              type="button"
              class="btn btn-register"
              onclick="handleRegister()"
            >
              📝 Register
            </button>
            <button
              type="button"
              class="btn btn-authenticate"
              onclick="handleAuthenticate()"
            >
              ✓ Authenticate
            </button>
          </div>
        </form>
      </div>

      <div class="info-box">
        🎯 Register your 4-gesture password pattern<br />
        🔒 Authenticate with the same pattern to gain access<br />
        📹 Real-time webcam hand detection
      </div>
    </div>

    <script>
      function showMessage(text, type) {
        const msgDiv = document.getElementById("message");
        msgDiv.innerHTML = `<div class="${type}">${text}</div>`;
      }

      function handleRegister() {
        const username = document.getElementById("username").value.trim();
        if (!username) {
          showMessage("Please enter a username", "error");
          return;
        }

        fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username }),
        })
          .then((r) => r.json())
          .then((data) => {
            if (data.success) {
              window.location.href = "/register";
            } else {
              showMessage(data.error || "Error", "error");
            }
          });
      }

      function handleAuthenticate() {
        const username = document.getElementById("username").value.trim();
        if (!username) {
          showMessage("Please enter a username", "error");
          return;
        }

        fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username }),
        })
          .then((r) => r.json())
          .then((data) => {
            if (data.success) {
              window.location.href = "/authenticate";
            } else {
              showMessage(data.error || "Error", "error");
            }
          });
      }
    </script>
  </body>
</html>
